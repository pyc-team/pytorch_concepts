defaults:
  - _self_

inference:
  _target_: ${model.train_inference._target_}
  _partial_: true
  # propagate: 'logits' # 'logits'/'probs' (only for DeterministicInference)

train_inference:  
  _target_: "torch_concepts.nn.DeterministicInference"
  _partial_: true
  # propagate: 'logits' # 'logits'/'probs' (only for DeterministicInference)
  # detach: false, true

# Allow for lightning training
lightning: true

# =============================================================
# Encoder (features -> latent space) settings
# =============================================================
latent_encoder: null # default is MLP
latent_encoder_kwargs:
  hidden_size: 64
  n_layers: 1
  activation: leaky_relu
  dropout: 0.


# =============================================================
# Concept distribution configs
# =============================================================
# TODO: hide GroupConfig internally
variable_distributions:
  _target_: "torch_concepts.GroupConfig"
  binary:   
    - _target_: "hydra.utils.get_class"
      path: "torch.distributions.RelaxedBernoulli"
    - temperature: 0.5
  categorical: 
    - _target_: "hydra.utils.get_class"
      path: "torch.distributions.RelaxedOneHotCategorical"
    - temperature: 0.5
  continuous: 
    - _target_: "hydra.utils.get_class"
      path: "torch.distributions.Normal"


# =============================================================
# Concept activation configs
# =============================================================
# variable_activations are intentionally omitted so that defaults
# from _DEFAULT_ACTIVATIONS are used (sigmoid for binary,
# partial(softmax, dim=-1) for categorical).


# =============================================================
# Optimizer settings
# =============================================================
optim_class:
  _target_: "hydra.utils.get_class"
  path: "torch.optim.AdamW"
optim_kwargs:
  lr: 0.00075


# =============================================================
# Scheduler settings
# =============================================================
scheduler_class: 
  _target_: "hydra.utils.get_class"
  path: "torch.optim.lr_scheduler.ReduceLROnPlateau"
scheduler_kwargs:
  factor: 0.1
  min_lr: 1e-6
  patience: 10
  monitor: "val_loss"
