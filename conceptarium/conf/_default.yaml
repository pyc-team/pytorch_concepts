defaults:
  - dataset: dag_asia
  - model: cbm
  - loss: standard
  - metrics: standard
  - _self_

# =============================================================
# Hydra sweep settings
# =============================================================
hydra:
  mode: MULTIRUN
  job:
    name: unnamed_sweep
    chdir: true
  sweep:
    dir: "outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}_${hydra.job.name}"
    subdir: "${hydra.job.num}"

# =============================================================
# Pytorch Lightning Trainer settings
# =============================================================
trainer:
  logger: null
  log_model: false # whether to save checkpoint on wandb
  max_epochs: 200
  monitor: "val_loss"
  patience: 20
  accelerator: "auto"
  save_top_k: 1 # whether to save best checkpoint locally
  save_last: false # whether to save last checkpoint locally
  save_weights_only: true

seed: 42  # train/run seed
notes: null
debug: false