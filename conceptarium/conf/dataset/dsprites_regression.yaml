defaults:
  - _commons
  - _self_

_target_: torch_concepts.data.datamodules.dsprites_regression.DSpritesRegressionDataModule

name: dsprites_regression

seed: ${seed}

# dataset parameters
num_samples: null
concepts: null
formulas: null

# backbone handling and embedding precomputation
backbone: null
precompute_embs: False
force_recompute: False

# Task label - formula-computed regression target
default_task_names: [target]

label_descriptions:
  value_shape: "Shape type (1=square, 2=circle, 3=heart)"
  value_scale: "Scale of the shape"
  value_orientation: "Orientation angle of the shape"
  value_x_position: "X position of the shape center"
  value_y_position: "Y position of the shape center"
  target: "Formula-computed regression target"
