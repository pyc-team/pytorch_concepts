defaults:
  - _commons
  - _self_

_target_: torch_concepts.data.datamodules.awa2.AWA2DataModule

name: awa2

seed: ${seed}

# Image loading
image_size: 224

# Split parameters (used only on first build)
train_size: 0.6
val_size: 0.2

# backbone handling and embedding precomputation
backbone: resnet50
precompute_embs: true
force_recompute: false

# Task label - animal name (50 classes)
default_task_names: [class]

# splitter - uses the split generated during dataset build
splitter:
  _target_: torch_concepts.data.splitters.native.NativeSplitter

# Concept descriptions for the 85 binary attributes + class
