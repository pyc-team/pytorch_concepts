defaults:
  - _commons
  - _self_

_target_: torch_concepts.data.datamodules.awa2.AWA2DataModule

name: awa2

seed: ${seed}

# the incomplete version of the AWA2 dataset is obtained selecting 
# the same concepts as in "Avoiding Leakage Poisoning: Concept Interventions Under Distribution Shifts"
# link: https://arxiv.org/pdf/2504.17921v1.
concept_subset: [black, gray, stripes, hairless, flippers, paws, plains, fierce, solitary, class] # include the task label

# backbone handling and embedding precomputation
backbone: resnet50
precompute_embs: true
force_recompute: false

# Task label - animal name (50 classes)
default_task_names: [class]

# splitter - no official split exists for AwA2, so the datamodule splits randomly
splitter:
  _target_: torch_concepts.data.splitters.random.RandomSplitter

# Concept descriptions for the 85 binary attributes + class
label_descriptions: null