defaults:
  - _commons
  - _self_

# Target class for Hydra instantiation
_target_: torch_concepts.data.datamodules.continuous_toy_dag.ToyFunctionDAGDataModule

# Random seed (inherited from global config)
seed: ${seed}

# ===== DAG Structure Configuration =====
# Function-based DAG with continuous variables

# List of all variable names in the DAG
variables: ['x1', 'x2', 'x3', 'x4']

# DAG structure as list of [parent, child] edges
# Example: x1 -> x2 -> x4, x1 -> x3 -> x4
dag:
  - ['x1', 'x2']
  - ['x2', 'x4']
  - ['x1', 'x3']
  - ['x3', 'x4']

# Node functions: sympy expressions defining how children are computed from parents
# Use parent variable names in expressions
# Supported operations: +, -, *, /, **, sin, cos, exp, log, sqrt, etc.
node_functions:
  x2: 'x1**2'              # x2 = x1 squared
  x3: 'sin(x1)'            # x3 = sin(x1)
  x4: 'x2 + 0.5*x3'        # x4 = x2 + 0.5*x3 (linear combination)

# ===== Variable Type Configuration =====

# Type of variables: 'continuous' or 'binary'
variable_type: 'continuous'

# For binary variables only: cardinalities (ignored for continuous)
cardinalities: null

# ===== Sampling Configuration =====

# For continuous variables: parameters for sampling root (source) nodes
source_mean: 0.0   # Mean for Normal distribution
source_std: 1.0    # Standard deviation for Normal distribution

# ===== Noise Configuration =====

# gamma: Node-level noise
# - For continuous: each node gets additive Gaussian noise: node = node + gamma * N(0,1)
# - For binary: probability of swapping node values
gamma: 0.1

# theta: Embedding-level noise
# - Gaussian noise added to embeddings: embedding = embedding + theta * N(0,1)
theta: 0.05

# ===== Dataset Configuration =====

# Number of samples to generate
n_gen: 10000

# Latent variables (used for embedding generation but hidden from concepts)
latent_variables: []

# Subset of concepts to use (null = use all non-latent variables)
concept_subset: null

# ===== Autoencoder Configuration =====

autoencoder_kwargs:
  latent_dim: 32     # Dimension of learned embeddings
  noise: 0.0         # Noise during autoencoder training
  epochs: 1000       # Training epochs
  batch_size: 512    # Batch size for training
  lr: 0.001          # Learning rate
  patience: 50       # Early stopping patience

# ===== Backbone Configuration =====
backbone: null
precompute_embs: false
force_recompute: false

# ===== Concept Descriptions =====
label_descriptions:
  x1: "Root variable sampled from N(0,1)"
  x2: "Quadratic function of x1: x2 = x1^2"
  x3: "Trigonometric function of x1: x3 = sin(x1)"
  x4: "Linear combination: x4 = x2 + 0.5*x3"

# ===== Task Configuration =====
# No specific task - all variables treated as concepts
default_task_names: []
