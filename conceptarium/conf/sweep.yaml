defaults:
  - _default
  - _self_

hydra:
  job:
    name: test
  sweeper:
    # standard grid search
    params:
      seed: 42
      dataset: dag_asia #, dag_sachs, dag_insurance
      model: cbm, cem
      model.train_inference._target_:
        torch_concepts.nn.DeterministicInference,
        torch_concepts.nn.IndependentInference
      loss: standard
      # loss.concept_weight: 10
      # loss.task_weight: 1

dataset:
  batch_size: 2048
  # concept_subset: ['Attractive', 'Bald', 'Big_Nose', 'Black_Hair']  # for celeba

model:
  optim_kwargs:
    lr: 0.01
  latent_encoder_kwargs:
    hidden_size: 128
    n_layers: 1
    activation: leaky_relu
    dropout: 0.
  # embedding_size: 8  # for embedding models

metrics:
  summary_metrics: true
  perconcept_metrics: true # true or ${dataset.default_task_names}

trainer:
  # logger: wandb
  max_epochs: 200
  patience: 20

matmul_precision: medium

notes: test