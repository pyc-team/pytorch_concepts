# Steerling on Apple Silicon (arm64 macOS) — CPU/MPS, no CUDA, no Triton.
#
# Steerling declares `triton>=3.0` as a hard dependency, but Triton ships
# NO macOS/arm64 wheels. Steerling never imports triton at runtime (the
# attention path falls back to torch's eager scaled_dot_product_attention),
# so skipping it is safe.
#
# Setup:
#   1. conda env create -f environment_steerling_silicon.yaml
#   2. conda activate steerling-silicon
#   3. pip install --no-deps steerling==0.1.2
#   4. ln -sf $CONDA_PREFIX/lib/libomp.dylib \
#            $CONDA_PREFIX/lib/python3.13/site-packages/torch/lib/libomp.dylib
#
# Step 4 unifies the two libomp copies (conda's llvm-openmp and torch's bundled one)
# that otherwise trigger "OMP Error #15" on macOS. Redo after upgrading torch.
#
# (TORCH_COMPILE_DISABLE=1 is set automatically by torch_concepts.steerling.)
name: steerling-silicon
channels:
  - conda-forge
dependencies:
  - python=3.13.*
  - pip
  # Scientific base via conda (fastest arm64 builds)
  - numpy
  - pandas==2.2.*
  - scipy
  - scikit-learn
  - packaging
  - typing_extensions
  - tqdm
  # Visualisation
  - matplotlib
  - pillow              # PIL — used by data/datasets
  - wandb
  - pytables            # HDF5 / PyTables support
  - openpyxl            # Excel I/O
  - pip:
    # ── PyTorch ecosystem ─────────────────────────────────────────────
    - torch==2.8.0
    - torchvision
    - torchmetrics
    - lightning          # pytorch_lightning
    # ── HuggingFace / Steerling runtime ───────────────────────────────
    - transformers==4.57.6
    - tokenizers==0.22.2
    - tiktoken==0.8.0
    - safetensors==0.7.0
    - huggingface-hub==0.36.2
    - hf-xet==1.5.0
    # ── Steerling config / serialisation ──────────────────────────────
    - pydantic==2.10.6
    - pydantic-core==2.27.2
    - annotated-types==0.7.0
    # ── HTTP / caching (huggingface_hub deps) ─────────────────────────
    - requests==2.34.2
    - charset-normalizer==3.4.7
    - idna==3.17
    - urllib3==2.7.0
    - certifi==2026.5.20
    # ── Torch / model utilities ───────────────────────────────────────
    - regex==2026.5.9
    - pyyaml==6.0.3
    - filelock==3.29.0
    - fsspec==2026.4.0
    - jinja2==3.1.6
    - markupsafe==3.0.3
    - sympy==1.14.0
    - mpmath==1.3.0
    - networkx==3.6.1
    # ── Data / graph utilities ────────────────────────────────────────
    - pgmpy             # probabilistic graphical models (bnlearn dep)
    - bnlearn           # Bayesian networks
    - pyparsing         # parsing (bnlearn / matplotlib dep)
    - sympytorch        # symbolic torch expressions
    - anyio             # async I/O (used in data utils)
    - opencv-python     # cv2 — used in data/datasets
    - gdown             # download files from Google Drive (CelebA dataset)
    - datasets          # HuggingFace datasets
    # -- Hydra / config utilities ───────────────────────────────────────────
    - hydra-core
    - hydra-list-sweeper
