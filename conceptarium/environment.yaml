name: pyc
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12.*
  
  # Conda-forge's metapackage for PyTorch with CUDA support
  - pytorch-gpu
  - torchvision>=0.17.1
  - torchmetrics>=0.7

  - lightning
  - hydra-core
  - wandb
  - numpy
  - pandas==2.2.*
  - pytables
  - tqdm
  - scikit-learn
  - scipy
  - openpyxl

  - pip
  - pip:
    - bnlearn # library for Bayesian networks
    - gdown # to download files from Google Drive (CelebA dataset)
    - transformers # State-of-the-art pretrained models
    - hydra-list-sweeper
    - datasets # HuggingFace datasets
    - sympy # symbolic math 
    - sympytorch # sympy to pytorch conversion 